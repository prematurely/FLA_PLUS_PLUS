name: Release

on:
  push:
    tags:
      - v*

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release assets
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build
        shell: pwsh
        run: |
          msbuild .\FLACompatBridge.vcxproj `
            /m `
            /p:Configuration=Release `
            /p:Platform=Win32 `
            /p:PlatformToolset=v143 `
            /p:OutDir="${{ github.workspace }}\build\"

      - name: Stage release assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item .\build\FLACompatBridge.asi .\dist\FLACompatBridge.asi
          if (Test-Path .\FLACompatBridge.ini) {
            Copy-Item .\FLACompatBridge.ini .\dist\FLACompatBridge.ini
          }

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          prerelease: ${{ contains(github.ref_name, 'a') || contains(github.ref_name, 'b') || contains(github.ref_name, 'c') }}
          generate_release_notes: true
          files: |
            dist/FLACompatBridge.asi
            dist/FLACompatBridge.ini
          fail_on_unmatched_files: false
